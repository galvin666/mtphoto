<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT Photo - Bio & Portfolio Link</title>
    <!-- Google Fonts cho chữ ký nghệ thuật và văn bản hiện đại -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome hỗ trợ icon MXH -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* --- ĐỊNH DẠNG CHUNG --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #222;
        }

        /* --- CARD CHÍNH --- */
        .profile-card {
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            width: 100%;
            max-width: 430px; /* Bố cục mặc định trên điện thoại di động */
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- PANEL BÊN TRÁI (ẢNH BÌA & AVATAR) --- */
        .left-panel {
            width: 100%;
            height: 280px;
            position: relative;
        }

        .header-bg {
            width: 100%;
            height: 100%;
            /* Thay thế bằng ảnh Nikon được tìm kiếm */
            background-image: url('img/cover.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* Lớp phủ chuyển màu giúp ảnh bìa có chiều sâu */
        .header-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.3));
        }

        /* Khung ảnh đại diện hình tròn */
        .avatar-wrapper {
            position: absolute;
            bottom: -75px; /* Nằm đè lên ranh giới giữa 2 phần trên mobile */
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            overflow: hidden;
            z-index: 10;
            transition: all 0.4s ease;
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- PANEL BÊN PHẢI (NỘI DUNG & LIÊN KẾT) --- */
        .content-panel {
            background: #ffffff;
            flex: 1;
            padding: 95px 30px 40px 30px; /* Chừa khoảng trống cho Avatar đè lên */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
        }

        /* Khối Logo (Chữ ký nghệ thuật + Icon camera vẽ tay) */
        .brand-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 12px;
            width: 100%;
        }

        .camera-icon {
            width: 78px;
            height: auto;
            opacity: 0.9;
            transition: transform 0.3s ease;
        }

        .camera-icon:hover {
            transform: rotate(-5deg) scale(1.05);
        }

        .logo-text {
            font-family: 'Alex Brush', cursive;
            font-size: 44px;
            font-weight: 500;
            color: #1a1a1a;
            transform: rotate(-4deg);
            user-select: none;
        }

        /* Dòng giới thiệu dịch vụ */
        .bio-text {
            font-family: 'Alex Brush', cursive;
            font-size: 30px;
            letter-spacing: 0;
            color: #666;
            text-transform: none;
            margin-bottom: 35px;
            font-weight: 400;
            text-align: center;
            line-height: 1.15;
            width: calc(100% + 48px);
            margin-left: -24px;
            margin-right: -24px;
        }

        /* Danh sách nút bấm liên kết */
        .links-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 35px;
        }

        .links-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .links-heading {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 3px;
            color: #777777;
            text-transform: uppercase;
            text-align: center;
        }

        .pricing-action {
            margin-top: 6px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 20px;
            text-decoration: none;
            color: #333;
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            letter-spacing: 2px;
            border: 1px solid #333333;
            border-radius: 50px;
            background-color: #ffffff;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        /* Hiệu ứng di chuột tinh tế trên các nút bấm */
        .btn-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(0, 0, 0, 0.03), transparent);
            transition: all 0.6s ease;
        }

        .btn-link:hover::before {
            left: 100%;
        }

        .btn-link:hover {
            background-color: #111111;
            color: #ffffff;
            border-color: #111111;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Khối liên kết mạng xã hội */
        .price-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.72);
            z-index: 1000;
        }

        .price-modal.is-open {
            display: flex;
        }

        .price-modal__content {
            position: relative;
            max-width: min(92vw, 720px);
            max-height: 90vh;
        }

        .price-modal__image {
            display: block;
            max-width: 100%;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 22px 70px rgba(0, 0, 0, 0.35);
        }

        .price-modal__close {
            position: absolute;
            top: -14px;
            right: -14px;
            width: 38px;
            height: 38px;
            border: 0;
            border-radius: 50%;
            background: #ffffff;
            color: #111111;
            font-size: 26px;
            line-height: 1;
            cursor: pointer;
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.25);
        }

        .social-icons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: auto; /* Đẩy xuống sát đáy */
        }

        .social-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #777;
            font-size: 20px;
            transition: all 0.3s ease;
            text-decoration: none;
            line-height: 1;
        }

        .social-icon:hover {
            color: #111;
            transform: scale(1.2);
        }

        .zalo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border: 1.8px solid currentColor;
            border-radius: 6px;
            font-size: 8px;
            font-weight: 700;
            letter-spacing: -0.4px;
            line-height: 1;
            transform: translateY(-1px);
        }

        /* --- TỐI ƯU BỐ CỤC CHO MÀN HÌNH LỚN (PC / TABLET / LAPTOP) --- */
        @media (max-width: 380px) {
            .bio-text {
                font-size: 28px;
            }
        }

        @media (min-width: 850px) {
            body {
                background: linear-gradient(135deg, #e4e8f0 0%, #cbd4e1 100%);
                padding: 40px;
            }

            .profile-card {
                max-width: 960px;       /* Mở rộng chiều ngang trên máy tính */
                height: 580px;          /* Cố định chiều cao sang trọng */
                flex-direction: row;    /* Chuyển sang bố cục 2 cột nằm ngang */
                border-radius: 35px;
            }

            /* Cột trái chứa ảnh bìa lớn */
            .left-panel {
                width: 44%;
                height: 100%;
            }

            .header-bg {
                border-radius: 35px 0 0 35px;
            }

            /* Định vị lại ảnh đại diện nằm gọn gàng góc dưới bên trái của ảnh bìa nghệ thuật */
            .avatar-wrapper {
                bottom: 40px;
                left: 40px;
                transform: none;
                width: 110px;
                height: 110px;
                border: 4px solid #ffffff;
                box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            }

            /* Cột phải chứa thông tin thương hiệu */
            .content-panel {
                width: 56%;
                height: 100%;
                padding: 55px 60px;
                align-items: flex-start; /* Căn lề trái thanh lịch hơn trên màn hình lớn */
                justify-content: center;
            }

            .brand-section {
                justify-content: flex-start;
                margin-bottom: 8px;
            }

            .logo-text {
                font-size: 48px;
            }

            .bio-text {
                text-align: left;
                margin-bottom: 40px;
                padding-left: 5px;
                width: auto;
                margin-left: 0;
                margin-right: 0;
            }

            .links-group {
                gap: 14px;
                margin-bottom: 40px;
            }

            .links-heading {
                text-align: left;
                padding-left: 5px;
            }

            .btn-link {
                justify-content: flex-start; /* Nội dung nút căn lề trái tinh tế */
                padding: 16px 30px;
            }

            .social-icons {
                margin-top: 10px;
                padding-left: 0;
                justify-content: flex-end;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Khung hiển thị chính -->
    <div class="profile-card">
        
        <!-- Phần hình ảnh (Ảnh bìa & Avatar) -->
        <div class="left-panel">
            <div class="header-bg"></div>
            <div class="avatar-wrapper">
                <!-- Sử dụng ảnh chân dung phượt thủ nam ngồi xe máy cực chất -->
                <img src="img/avatar.jpg" alt="MT Photo Creator">
            </div>
        </div>

        <!-- Phần nội dung liên kết -->
        <div class="content-panel">
            
            <!-- Logo thương hiệu MT photo -->
            <div class="brand-section">
                <!-- SVG Icon máy ảnh line-art vẽ tay tinh tế -->
                <svg class="camera-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 96" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 36 L108 24 C112 24 115 26 116 30 L123 74 C124 78 121 82 117 83 L30 93 C26 94 23 92 22 88 L13 42 C12 39 13 37 16 36Z" />
                    <path d="M16 44 L108 32" />
                    <path d="M25 82 L117 70" />
                    <path d="M45 31 L47 22 C48 19 50 17 53 16 L80 12 C84 12 87 14 88 18 L91 26" />
                    <path d="M48 22 C59 23 73 21 86 16" stroke-width="1.5" />
                    <path d="M21 33 L36 31 C39 31 41 33 41 35 L41 38 L20 41 Z" />
                    <rect x="95" y="29" width="18" height="12" rx="2" transform="rotate(-7 95 29)" fill="#111" stroke="#111" />
                    <circle cx="67" cy="57" r="28" />
                    <circle cx="67" cy="57" r="19" stroke-width="1.8" />
                    <circle cx="67" cy="57" r="10" stroke-width="1.6" />
                    <path d="M102 13 L105 5" />
                    <path d="M91 13 L88 5" />
                    <path d="M113 17 L119 10" />
                </svg>
                <div class="logo-text">MT photo</div>
            </div>

            <!-- Dòng giới thiệu chủ đề -->
            <p class="bio-text">Trả ảnh siêu tốc, màu đẹp từ gốc</p>

            <!-- Các liên kết hành động -->
            <div class="links-group">
                <div class="links-section">
                    <div class="links-heading">Sample</div>
                    <a href="https://shotpik.com/show/albums/mtphoto-sample" target="_blank" rel="noopener noreferrer" class="btn-link">ẢNH COSPLAY KHÔNG HIỆU ỨNG</a>
                    <a href="https://shotpik.com/albums/mtphoto-sample2" target="_blank" rel="noopener noreferrer" class="btn-link">ẢNH COSPLAY CÓ HIỆU ỨNG</a>
                    <a href="https://shotpik.com/show/albums/mtphoto-outdoor-p1" target="_blank" rel="noopener noreferrer" class="btn-link">ẢNH OUTDOOR</a>
                </div>
                <button type="button" class="btn-link pricing-action" data-price-open>BÁO GIÁ CHỤP ẢNH</button>
            </div>

            <!-- Hệ thống liên kết mạng xã hội dưới chân trang -->
            <div class="social-icons">
                <a href="https://fb.com/manhtoan199" target="_blank" rel="noopener noreferrer" class="social-icon" title="Facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="https://zalo.me/0847920466" target="_blank" rel="noopener noreferrer" class="social-icon" title="Zalo"><span class="zalo-icon">Zalo</span></a>
                <a href="https://www.tiktok.com/@lubeovuive" target="_blank" rel="noopener noreferrer" class="social-icon" title="TikTok"><i class="fab fa-tiktok"></i></a>
            </div>

        </div>
    </div>

    <div class="price-modal" data-price-modal aria-hidden="true">
        <div class="price-modal__content" role="dialog" aria-modal="true" aria-label="Báo giá chụp ảnh">
            <button type="button" class="price-modal__close" data-price-close aria-label="Đóng báo giá">&times;</button>
            <img class="price-modal__image" src="img/baogia.png" alt="Báo giá chụp ảnh">
        </div>
    </div>

    <script>
        const priceModal = document.querySelector('[data-price-modal]');
        const priceOpen = document.querySelector('[data-price-open]');
        const priceClose = document.querySelector('[data-price-close]');

        function openPriceModal() {
            priceModal.classList.add('is-open');
            priceModal.setAttribute('aria-hidden', 'false');
        }

        function closePriceModal() {
            priceModal.classList.remove('is-open');
            priceModal.setAttribute('aria-hidden', 'true');
        }

        priceOpen.addEventListener('click', openPriceModal);
        priceClose.addEventListener('click', closePriceModal);
        priceModal.addEventListener('click', (event) => {
            if (event.target === priceModal) {
                closePriceModal();
            }
        });
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && priceModal.classList.contains('is-open')) {
                closePriceModal();
            }
        });
    </script>

</body>
</html>
